[mcu pico_adxl345]
serial: /dev/serial/by-id/usb-Klipper_rp2040_E660B4404B355A35-if00

[adxl345 head]
cs_pin: pico_adxl345:gpio1
spi_bus: spi0a
#axes_map: -z, x, -y #update your axes mapping

[adxl345 bed]
cs_pin: pico_adxl345:gpio9
spi_bus: spi1a

[resonance_tester]
accel_chip_x: adxl345 head
accel_chip_y: adxl345 bed
probe_points:
    110, 110, 30  #middle of bed as an example